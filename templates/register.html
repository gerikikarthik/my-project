<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">
    <div class="card">

        <h2>Register</h2>

        <form method="POST">

            <input
                type="text"
                name="username"
                placeholder="Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Register
            </button>

        </form>

        <p>
            Already have an account?

            <a href="{{ url_for('login') }}">
                Login
            </a>
        </p>

    </div>
</div>

</body>
</html>
