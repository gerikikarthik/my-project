```html
<!DOCTYPE html>
<html>
<head>
    <title>Edit Task</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="container">

    <h2>✏️ Edit Task</h2>

    <form method="POST">

        <label>Task Title</label>
        <input
            type="text"
            name="title"
            value="{{ task.title }}"
            required
        >

        <label>Priority</label>
        <select name="priority">

            <option value="Low"
                {% if task.priority == "Low" %}selected{% endif %}>
                Low
            </option>

            <option value="Medium"
                {% if task.priority == "Medium" %}selected{% endif %}>
                Medium
            </option>

            <option value="High"
                {% if task.priority == "High" %}selected{% endif %}>
                High
            </option>

        </select>

        <label>Due Date</label>
        <input
            type="date"
            name="due_date"
            value="{{ task.due_date }}"
        >

        <button type="submit">
            Update Task
        </button>

    </form>

</div>

</body>
</html>
```
